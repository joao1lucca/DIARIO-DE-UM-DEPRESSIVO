<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Criar Conta</h1>

        <p>

            Comece sua jornada

        </p>

        <form>

            <input
                type="text"
                placeholder="Nome"
                required
            >

            <input
                type="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                placeholder="Senha"
                required
            >

            <input
                type="password"
                placeholder="Confirmar senha"
                required
            >

            <button>

                Cadastrar

            </button>

        </form>

        <a href="login.html">

            Voltar para Login

        </a>

    </div>

</body>

</html>
