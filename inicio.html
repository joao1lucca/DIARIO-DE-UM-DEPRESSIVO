<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MindTrack</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="dashboard">

        <header>

            <h1>MindTrack</h1>

            <p>
                Como você está hoje?
            </p>

        </header>

        <section class="card">

            <h2>Humor do dia</h2>

            <div class="humor">

                <button>😄</button>

                <button>🙂</button>

                <button>😐</button>

                <button>😔</button>

                <button>😢</button>

            </div>

        </section>

        <section class="card">

            <h2>Hábitos</h2>

            <label>

                Água (copos)

            </label>

            <input
                type="number"
                placeholder="Ex: 6"
            >

            <label>

                Sono (horas)

            </label>

            <input
                type="number"
                placeholder="Ex: 8"
            >

            <label>

                Exercício (minutos)

            </label>

            <input
                type="number"
                placeholder="Ex: 30"
            >

        </section>

        <section class="card">

            <h2>Meta de hoje</h2>

            <input
                type="text"
                placeholder="Ex: Caminhar 15 minutos"
            >

            <button>

                Salvar Meta

            </button>

        </section>

        <section class="card">

            <h2>Anotação do dia</h2>

            <textarea
                placeholder="Como foi seu dia?"
            ></textarea>

            <button>

                Salvar Registro

            </button>

        </section>

    </div>
    <script src="js/script.js"></script>
</body>

</html>
